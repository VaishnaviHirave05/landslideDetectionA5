<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | LandslideGuard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===============================
   VARIABLES
================================ */
:root {
    --primary: #6a5cff;
    --secondary: #22d3ee;
    --glass-bg: rgba(255, 255, 255, 0.08); /* MORE TRANSPARENT */
    --glass-border: rgba(255, 255, 255, 0.25);
    --text-main: #ffffff;
    --text-secondary: rgba(255,255,255,0.7);
}

/* ===============================
   PAGE BASE WITH BACKGROUND IMAGE
================================ */
body {
    margin: 0;
    min-height: 100vh;
    font-family: "Poppins", system-ui, sans-serif;
    color: var(--text-main);
    background:
        linear-gradient(rgba(2,6,23,0.75), rgba(2,6,23,0.75)),
        url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* ===============================
   NAVBAR
================================ */
.navbar {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding: 1rem 2rem;
    position: sticky;
    top: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.nav-brand {
    font-size: 1.5rem;
    font-weight: 700;
    background: linear-gradient(to right, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.nav-menu {
    display: flex;
    gap: 1.5rem;
    list-style: none;
    margin: 0;
    padding: 0;
}

.nav-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.nav-link:hover {
    color: white;
    background: rgba(255,255,255,0.08);
}

.nav-btn {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    padding: 0.5rem 1.5rem;
    border-radius: 50px;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
}

.nav-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(79,172,254,0.35);
}

/* ===============================
   CENTER FORM
================================ */
.form-container {
    min-height: calc(100vh - 90px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
}

/* ===============================
   GLASS CARD (TRANSPARENT)
================================ */
.glass-card {
    width: 100%;
    max-width: 420px;
    background: var(--glass-bg);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
    border-radius: 20px;
    border: 1px solid var(--glass-border);
    padding: 2.5rem;
    box-shadow:
        0 30px 60px rgba(0,0,0,0.45),
        inset 0 0 0 1px rgba(255,255,255,0.05);
}

/* ===============================
   HEADING
================================ */
.glass-card h2 {
    font-size: 1.9rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
}

/* ===============================
   FORM
================================ */
.form-group {
    margin-bottom: 1.4rem;
}

.form-label {
    font-weight: 600;
    margin-bottom: 0.35rem;
    display: block;
}

/* INPUT MORE TRANSPARENT */
.form-control {
    width: 90%;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.35);
    color: white;
    font-size: 0.95rem;
}

.form-control::placeholder {
    color: rgba(255,255,255,0.5);
}

.form-control:focus {
    outline: none;
    border-color: var(--secondary);
    box-shadow: 0 0 0 2px rgba(34,211,238,0.25);
}

/* ===============================
   BUTTON
================================ */
.btn-primary {
    width: 100%;
    padding: 0.85rem;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    border: none;
    font-weight: 700;
    color: white;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.3s ease;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
}

/* ===============================
   REGISTER LINK
================================ */
.auth-link {
    margin-top: 1.5rem;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-secondary);
}

.auth-link a {
    color: var(--secondary);
    font-weight: 600;
    text-decoration: none;
}

.auth-link a:hover {
    text-decoration: underline;
}

/* ===============================
   RESPONSIVE
================================ */
@media (max-width: 480px) {
    .glass-card {
        padding: 2rem 1.5rem;
    }

    .glass-card h2 {
        font-size: 1.7rem;
    }

    .nav-menu {
        gap: 1rem;
    }
}
</style>
</head>

<body>

<!-- ===============================
     NAVBAR
================================ -->
<nav class="navbar">
    <a href="{{ url_for('index') }}" class="nav-brand">
        <span>⛰️</span> LandslideGuard
    </a>
    <ul class="nav-menu">
        <li><a href="{{ url_for('index') }}" class="nav-link">Home</a></li>
        <li><a href="{{ url_for('register') }}" class="nav-btn">Get Started</a></li>
    </ul>
</nav>

<!-- ===============================
     LOGIN FORM
================================ -->
<div class="form-container">
    <div class="glass-card">
        <h2>Welcome Back</h2>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control"
                       placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Login</button>
        </form>

        <div class="auth-link">
            Don’t have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </div>
    </div>
</div>

</body>
</html>
